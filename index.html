<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Link Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        :root { --primary: #38bdf8; --secondary: #818cf8; --bg: #0f172a; --text: #f8fafc; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .bg-animation { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #312e81); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 40px 30px; text-align: center; max-width: 420px; width: 85%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeIn 1s ease-out; display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .channel-logo { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(129, 140, 248, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(129, 140, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); } }
        
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 25px; margin-top: 0; background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .steps-container { display: flex; justify-content: space-between; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .step { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #94a3b8; gap: 8px; flex: 1; position: relative; }
        .step:not(:last-child)::after { content: '\f054'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: -5px; top: 10px; color: #475569; font-size: 10px; opacity: 0.5; }
        .step i { font-size: 20px; color: var(--primary); background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 50%; }
        
        p { color: #94a3b8; margin-bottom: 25px; font-size: 14px; line-height: 1.6; padding: 0 10px; }
        
        .btn { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; box-sizing: border-box; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -10px rgba(129, 140, 248, 0.8); }
        .btn:active { transform: translateY(1px); }
        
        /* Modified to a Premium Green Gradient */
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); display: none; }
        .btn-success:hover { box-shadow: 0 10px 25px -10px rgba(16, 185, 129, 0.8); }
        
        .status-msg { font-size: 13px; font-weight: 500; min-height: 20px; margin-top: 10px; border-radius: 12px; padding: 0; opacity: 0; transition: all 0.3s ease; width: 100%; box-sizing: border-box; }
        .status-msg.active { padding: 12px 15px; opacity: 1; }
        .info-text { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); }
        .error-text { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); animation: shake 0.4s ease-in-out; }
        .success-text { color: #10b981; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <img src="logo.jpg" id="logoImg" alt="SL Link Hub" class="channel-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/100x100?text=SL';">
        <h1>SL Link Hub</h1>
        
        <div class="steps-container">
            <div class="step"><i class="fas fa-hand-pointer"></i><span>1. Click</span></div>
            <div class="step"><i class="fas fa-hourglass-half"></i><span>2. Wait 10s - 15s</span></div>
            <div class="step"><i class="fas fa-lock-open"></i><span>3. Unlock</span></div>
        </div>

        <p>🚀 Your requested Telegram link is ready! Click the button below 👇 and stay on the sponsor page for 10–15 seconds ⏳ to unlock your destination 🎯</p>
        
        <button id="unlockBtn" class="btn"><i class="fas fa-lock"></i> Unlock Link</button>
        <a href="#" id="finalBtn" class="btn btn-success" style="text-decoration: none; display: none;" target="_blank"><i class="fab fa-telegram-plane"></i> Join Now</a>
        
        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script>
        const directLinks = [
            'https://lasereither.com/jzsn5hu885?key=d382e972f8c66e23c78bb20fd1755c46',
            'https://lasereither.com/b61f7zh5c?key=4de66d551bb94b8516349d9410507a8d',
            'https://lasereither.com/pgp00wh4r?key=fb93d9a58f44c4560a024448bda11905',
            'https://lasereither.com/u70cfm85?key=f727f93ea54399f15bdc4281509e964f',
            'https://lasereither.com/i1ikw042zk?key=57a7d42043f8b360bd9d5d01c8adbd4c'
        ];

        const unlockBtn = document.getElementById('unlockBtn');
        const finalBtn = document.getElementById('finalBtn');
        const statusMsg = document.getElementById('statusMessage');

        let targetUrl = "https://t.me/sllinkhub1"; // Default fallback
        let hashCode = window.location.hash.substring(1); 

        function unscramble(str) {
            return str.split('').reverse().map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('');
        }

        if (hashCode) {
            try {
                let decoded = unscramble(hashCode);
                targetUrl = "https://t.me/" + decoded;
            } catch (e) {
                console.error("Invalid hash.");
            }
        }

        finalBtn.addEventListener('click', function(e) {
            e.preventDefault(); 
            window.location.href = targetUrl; 
        });

        let isHuman = false;
        let adOpenedTime = 0;
        let waitingForUser = false;

        const verifyHuman = () => { isHuman = true; };
        unlockBtn.addEventListener('mouseenter', verifyHuman, {once: true});
        unlockBtn.addEventListener('touchstart', verifyHuman, {once: true});

        unlockBtn.addEventListener('click', function(e) {
            if (!isHuman || !e.isTrusted) {
                statusMsg.innerHTML = '<i class="fas fa-robot"></i> Bot detected. Please interact normally.';
                statusMsg.className = "status-msg active error-text";
                e.preventDefault();
                return;
            }

            const randomIndex = Math.floor(Math.random() * directLinks.length);
            window.open(directLinks[randomIndex], '_blank');

            adOpenedTime = Date.now();
            waitingForUser = true;
            
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            
            statusMsg.innerHTML = '<i class="fas fa-info-circle"></i> Waiting... Please stay on the opened page for 10 seconds.';
            statusMsg.className = "status-msg active info-text";
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && waitingForUser) {
                const timeSpentAway = Date.now() - adOpenedTime;
                if (timeSpentAway < 10000) { 
                    const secondsSpent = Math.floor(timeSpentAway / 1000);
                    statusMsg.innerHTML = `<i class="fas fa-exclamation-triangle"></i> You only spent ${secondsSpent}s on the page. Please wait at least 10 seconds!`;
                    statusMsg.className = "status-msg active error-text";
                    
                    unlockBtn.innerHTML = '<i class="fas fa-redo"></i> Try Again';
                    waitingForUser = false; 
                } else {
                    statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Your link is successfully unlocked!';
                    statusMsg.className = "status-msg active success-text";
                    unlockBtn.style.display = "none";
                    finalBtn.style.display = "flex"; 
                    waitingForUser = false;
                }
            }
        });
    </script>
</body>
</html>
