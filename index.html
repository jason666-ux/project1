
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Link Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root { 
            --primary: #38bdf8; 
            --secondary: #818cf8;
            --bg: #0f172a; 
            --text: #f8fafc; 
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .bg-animation { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; 
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a, #312e81); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 40px 30px; 
            text-align: center; 
            max-width: 400px; 
            width: 85%; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            animation: fadeIn 1s ease-out; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .channel-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(129, 140, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); }
        }

        h1 { 
            font-size: 32px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            margin-top: 0;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        p { 
            color: #94a3b8; 
            margin-bottom: 20px; 
            font-size: 15px; 
            line-height: 1.6; 
        }

        .btn { 
            background: linear-gradient(90deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            padding: 16px 32px; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            margin-bottom: 15px;
        }

        .btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px -10px rgba(129, 140, 248, 0.8); 
        }

        .btn:active { 
            transform: translateY(0); 
        }

        .btn-success {
            background: linear-gradient(90deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            display: none;
        }

        .btn-success:hover {
            box-shadow: 0 10px 25px -10px rgba(16, 185, 129, 0.8);
        }

        .status-msg { 
            font-size: 14px; 
            font-weight: 500; 
            min-height: 40px;
            margin-top: 10px;
            color: #94a3b8;
        }

        .error-text {
            color: #ef4444;
            animation: shake 0.4s ease-in-out;
        }

        .success-text {
            color: #10b981;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container">
        <!-- Replaced Base64 with a standard external file reference -->
        <img src="logo.jpg" id="logoImg" alt="SL Link Hub" class="channel-logo">

        <h1>SL Link Hub</h1>
        <p>Click the button below to verify. You must view the sponsor page for at least 10 seconds to unlock your target link.</p>

        <button id="unlockBtn" class="btn">Verify to Unlock Link</button>
        <a href="#" id="finalBtn" class="btn btn-success" style="text-decoration: none; display: none;" target="_blank">Go to Target Link</a>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script>
        const directLinks = [
            'YOUR_ADSTERRA_DIRECT_LINK_1',
            'YOUR_MONETAG_DIRECT_LINK_1'
        ];

        const unlockBtn = document.getElementById('unlockBtn');
        const finalBtn = document.getElementById('finalBtn');
        const statusMsg = document.getElementById('statusMessage');

        const urlParams = new URLSearchParams(window.location.search);
        const encodedDest = urlParams.get('dest');
        let targetUrl = "https://t.me/sllinkhub1";

        if (encodedDest) {
            try {
                targetUrl = atob(encodedDest);
            } catch (e) {
                console.error("Invalid destination parameter.");
            }
        }
        finalBtn.href = targetUrl; 

        let isHuman = false;
        let adOpenedTime = 0;
        let waitingForUser = false;

        const verifyHuman = () => { isHuman = true; };
        unlockBtn.addEventListener('mouseenter', verifyHuman, {once: true});
        unlockBtn.addEventListener('touchstart', verifyHuman, {once: true});

        unlockBtn.addEventListener('click', function(e) {
            if (!isHuman || !e.isTrusted) {
                statusMsg.innerText = "Bot detected. Please interact with the page normally.";
                statusMsg.className = "status-msg error-text";
                e.preventDefault();
                return;
            }

            const randomIndex = Math.floor(Math.random() * directLinks.length);
            const selectedLink = directLinks[randomIndex];

            window.open(selectedLink, '_blank');

            adOpenedTime = Date.now();
            waitingForUser = true;

            this.innerText = 'Checking...';
            statusMsg.innerText = "Waiting... Please stay on the opened page for 10 seconds.";
            statusMsg.className = "status-msg";
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && waitingForUser) {
                const timeSpentAway = Date.now() - adOpenedTime;

                if (timeSpentAway < 10000) { 
                    const secondsSpent = Math.floor(timeSpentAway / 1000);
                    statusMsg.innerText = `You only spent ${secondsSpent} seconds on the ad page. You must wait at least 10 to 15 seconds!`;
                    statusMsg.className = "status-msg error-text";

                    unlockBtn.innerText = 'Try Again';
                    waitingForUser = false; 
                } else {
                    statusMsg.innerText = "Your link is unlocked.";
                    statusMsg.className = "status-msg success-text";

                    unlockBtn.style.display = "none";
                    finalBtn.style.display = "block";

                    waitingForUser = false;
                }
            }
        });
    </script>
</body>
</html>
